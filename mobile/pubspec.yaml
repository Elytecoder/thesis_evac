name: mobile
description: AI-Powered Evacuation Route Recommendation Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Map display
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # Location services
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  
  # API & Network
  dio: ^5.4.0
  http: ^1.2.0
  connectivity_plus: ^6.0.0
  
  # Local storage (offline support)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  flutter_secure_storage: ^9.2.4
  
  # State management & utilities
  shared_preferences: ^2.2.0
  uuid: ^4.4.0
  
  # Media picker
  image_picker: ^1.0.7
  flutter_image_compress: ^2.3.0
  
  # Voice guidance during live navigation (online only)
  flutter_tts: ^4.2.1
  
  # Collections utilities
  collection: ^1.18.0
  
  # Date formatting
  intl: ^0.19.0

  # Open http(s) media links (e.g. hosted video) from MDRRMO report detail
  url_launcher: ^6.2.5
  flutter_compass: ^0.8.1
  # Inline video playback for hazard report videos (base64 or HTTP)
  video_player: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/haznav_logo.png"
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/images/haznav_logo.png"
  min_sdk_android: 21

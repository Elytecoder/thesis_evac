# Render Blueprint - Django backend
# In Render dashboard: set "Root Directory" to "backend" for this service.
services:
  - type: web
    name: thesis-evac-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    # Create test users (MDRRMO + residents) on every start if missing; then start server. No Shell needed.
    startCommand: python manage.py create_test_users 2>/dev/null; gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: HAZARD_VIDEO_UPLOAD
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
